# Kubernetes manifests for lp proxy on k3d
# This creates a reverse proxy to the ODROID C4's API server through k3d's ingress

apiVersion: v1
kind: ConfigMap
metadata:
  name: lp-proxy-config
  namespace: lp
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;

      upstream lp_backend {
        server 192.168.1.12:8000;
      }

      server {
        listen 80;
        server_name _;

        location / {
          proxy_pass http://lp_backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_buffering off;
          proxy_request_buffering off;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lp-proxy
  namespace: lp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lp-proxy
  template:
    metadata:
      labels:
        app: lp-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: lp-proxy-config

---
apiVersion: v1
kind: Service
metadata:
  name: lp-proxy
  namespace: lp
spec:
  selector:
    app: lp-proxy
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lp
  namespace: lp
spec:
  ingressClassName: traefik
  rules:
  - host: lp.cutedocs.org  # Change to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lp-proxy
            port:
              number: 80
  tls:
  - hosts:
    - lp.cutedocs.org
    secretName: cutedocs-wildcard-tls
