<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>lp</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <button id="back-btn" class="hidden" aria-label="Back">&larr;</button>
    <h1 id="header-title">lp</h1>
    <div class="header-spacer"></div>
    <button id="share-btn" aria-label="Share screenshot">&#x1F4F7;</button>
    <button id="vinyl-btn" aria-label="Vinyl style"><img src="/api/vinyl/preview/spiral-purple" alt=""></button>
  </header>

  <main id="content">
    <input id="search" type="text" placeholder="Search artists..." autocomplete="off">
    <div id="artist-grid" class="tile-grid view"></div>
    <div id="album-grid" class="tile-grid view hidden"></div>
  </main>

  <footer id="now-playing" class="hidden">
    <div id="np-info">
      <span id="np-track"></span>
      <span id="np-artist-album"></span>
    </div>
    <button id="np-stop">Stop</button>
  </footer>

  <div id="share-modal" class="hidden" role="dialog" aria-modal="true">
    <div id="share-modal-backdrop"></div>
    <div id="share-modal-content">
      <img id="share-modal-img" alt="Captured screenshot">
      <div id="share-modal-actions">
        <a id="share-modal-download" download>Download</a>
        <button id="share-modal-close">Close</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
