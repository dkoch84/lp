<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>lp</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <button id="back-btn" class="hidden" aria-label="Back">&larr;</button>
    <h1 id="header-title">lp</h1>
    <div class="header-spacer"></div>
    <button id="vinyl-btn" aria-label="Vinyl style">&#9898;</button>
  </header>

  <main id="content">
    <div id="artist-grid" class="tile-grid view"></div>
    <div id="album-grid" class="tile-grid view hidden"></div>
  </main>

  <footer id="now-playing" class="hidden">
    <div id="np-info">
      <span id="np-track"></span>
      <span id="np-artist-album"></span>
    </div>
    <button id="np-stop">Stop</button>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
